<table class="body-wrap" style="font-family: 'Helvetica Neue',Helvetica,Arial,sans-serif; font-size: 14px; width: 100%; background-color: #f6f6f6; margin: 0;" bgcolor="#f6f6f6">
    <tbody>
    <tr>
        <td></td>
        <td class="container" width="600" style="display: block !important; max-width: 600px !important; margin: 0 auto; clear: both !important;">
            <div class="content" style="max-width: 600px; margin: 0 auto; padding: 20px;">
                <table class="main" width="100%" cellpadding="0" cellspacing="0" style="border-radius: 5px; background-color: #fff; border: 1px solid #e9e9e9;" bgcolor="#fff">
                    <tbody>
                    <tr>
                        <td style="font-size: 18px; font-weight: bold; text-align: center; background-color: #1e88e5; color: #fff; padding: 20px; border-radius: 5px 5px 0 0;" align="center">
                            Reset Your Password
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 20px; font-size: 14px; line-height: 1.6; color: #333;">
                            <p>Hi <strong>[[${email}]]</strong>,</p>
                            <p>We received a request to reset your password. Click the button below to set a new password:</p>
                            <p style="text-align: center; margin: 30px 0;">
                                <a th:href="${body}" style="background-color: #1e88e5; color: #fff; text-decoration: none; padding: 12px 24px; border-radius: 5px; font-weight: bold;">
                                    Reset Password
                                </a>
                            </p>
                            <p>If you didn’t request a password reset, please ignore this email.</p>

                            <p>Thanks,<br/>The Support Team</p>
                        </td>
                    </tr>
                    </tbody>
                </table>

            </div>
        </td>
        <td></td>
    </tr>
    </tbody>
</table>
